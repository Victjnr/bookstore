name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend — PHP Unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend/onlinebookstore
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2       
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, xml, pdo, pdo_mysql
          coverage: xdebug                      

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/onlinebookstore/composer.lock') }}
          restore-keys: |                         # fix: added fallback
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader
        # fix: removed --no-suggest (deprecated in Composer 2)

      - name: Run PHP unit tests
        run: |
          if [ -f .env.example ] && [ ! -f .env ]; then cp .env.example .env || true; fi
          vendor/bin/phpunit --coverage-text --colors=never
          # fix: removed '|| true' — failures now correctly break the build

  frontend-build:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend/cozy-bookstore-main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/cozy-bookstore-main/package-lock.json  # fix

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        env:
          CI: true
        run: npm test                            

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/cozy-bookstore-main/dist  # fix: full path, not relative 'dist'